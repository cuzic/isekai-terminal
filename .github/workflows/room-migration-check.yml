name: Room migration consistency check

# Room(AppDatabase)のマイグレーション番号の整合性をチェックする。
# 複数の並行作業(worktree/エージェント)が同時に新しいマイグレーションを追加すると、
# 同じ version 番号を奪い合って後から再採番が必要になる問題(実際に過去複数回発生、
# PLAN.md「Phase 10完了後の外部レビュー」参照)を早期に検出するためのゲート。
# 詳細は android/migration_registry.toml と scripts/check-room-migrations.sh を参照。

on:
  push:
    branches: [main]
    paths:
      - "android/src/main/kotlin/tools/isekai/terminal/data/AppDatabase.kt"
      - "android/migration_registry.toml"
      - "scripts/check-room-migrations.sh"
  pull_request:
    paths:
      - "android/src/main/kotlin/tools/isekai/terminal/data/AppDatabase.kt"
      - "android/migration_registry.toml"
      - "scripts/check-room-migrations.sh"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Room migration chain and registry consistency
        run: scripts/check-room-migrations.sh
