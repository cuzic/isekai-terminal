name: rust-core test check

# rust-core全体のcargo testをCIで実行する(ISEKAI_PIPE_DESIGN.md §8 Epic Cで
# 指摘されていたギャップ: 「rust-core全体のcargo testを実行するCIワークフローが
# 一つも存在しない」への対応)。noq-multipath-spike(実機検証用の使い捨てコード、
# CLAUDE.md参照)はworkspace member自体から外してあるため`--workspace`の対象に
# 含まれない(Codexアーキテクチャレビュー指摘、以前は member に含めたまま
# `--exclude noq-multipath-spike`で個別に除外する運用だった)——それ以外は
# `real_sshd_bootstrap_e2e.rs`のようなopt-in E2Eテスト(実/usr/sbin/sshdを
# 非特権ユーザーとして起動)を含め、GitHub-hosted ubuntu runnerだけで完結する。
#
# ネットワークnamespace/tc netemを使うnetlabシナリオ(root権限が必要)は対象外
# (rust-core-netlab-check.ymlが別途カバーする)。
#
# test-macos: isekai-ssh/isekai-pipeおよびそれが依存するプラットフォーム横断crate
# (isekai-netmon等)は公式にmacOS対応(release-build.ymlがx86_64/aarch64-apple-darwin
# 向けにビルドしている)だが、実際のtest suiteをmacOSランナー上で実行するCIが
# これまで一つも無く、macOS固有のバグはリリースタグを打つ時(--versionスモーク
# テストのみ)まで発見されなかった。isekai-terminal-core(Android/iOS向けUniFFI
# crate。isekai_pipe_quic_transport.rsがLinux musl静的バイナリをinclude_bytes!で
# 無条件に埋め込むため、別途zig/cargo-zigbuildの前提ビルドが要る)とuniffi-bindgen
# (Android/iOS binding生成ツール、CLI/shared crateのテスト対象外)は除外し、
# それ以外のCLI/shared crateのみをmacOSでも検証する。iOS側の別ビルド確認は
# ios-rust-core-check.yml等が既にカバーしている。
#
# test-windows: 詳細は各ジョブのコメント参照。

on:
  push:
    branches: [main]
    paths:
      - "rust-core/**"
      - "!rust-core/noq-multipath-spike/**"
      - ".github/workflows/rust-core-test-check.yml"
  pull_request:
    paths:
      - "rust-core/**"
      - "!rust-core/noq-multipath-spike/**"
      - ".github/workflows/rust-core-test-check.yml"
  workflow_dispatch:

concurrency:
  group: rust-core-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
      # `real_sshd_bootstrap_e2e.rs`等がstderrに出すisekai-transport/isekai-bootstrapの
      # debug/infoログでCI出力が読みにくくなるのを避ける(ローカル開発時のデフォルトは
      # env_logger未設定=warn相当のまま)。
      RUST_LOG: warn
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain versions
        run: |
          rustc --version
          cargo --version
          ssh -V
          /usr/sbin/sshd -V || true
          ssh-keygen -V || true

      # cargo-zigbuildのinstall・musl静的バイナリのビルド・`cargo nextest run`より前に
      # 置く(以前はこのステップがそれらより後にあり、`rust-core/target`を含むキャッシュが
      # 一切効かないままcargo-zigbuildの毎回のcompile-from-scratchとisekai-pipeの
      # musl再ビルドが走っていた)。
      - name: Cache cargo (rust-core)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-core/target
          key: rust-core-test-${{ runner.os }}-${{ hashFiles('rust-core/Cargo.lock') }}
          restore-keys: |
            rust-core-test-${{ runner.os }}-

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Install openssh-server (opt-in real-sshd E2E tests need /usr/sbin/sshd)
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server

      - name: Build isekai-pipe musl binaries (build prerequisite for isekai-terminal-core)
        # rust-core/src/isekai_pipe_quic_transport.rs が include_bytes! で埋め込む
        # isekai-pipe の x86_64/aarch64 musl静的バイナリ。iOS/Androidどちらのビルドにも
        # 依らずisekai-terminal-coreを cargo test するだけでも常に必要な前提
        # (ios-rust-core-check.yml/ios-app-build-check.yml/ios-ssh-vertical-slice-check.yml/
        # ios-logic-linux-check.ymlは既に対応済みだったが、このワークフローだけ追従が漏れていた)。
        run: |
          set -euo pipefail
          curl -fL -o /tmp/zig.tar.xz \
            "https://ziglang.org/download/0.16.0/zig-x86_64-linux-0.16.0.tar.xz"
          mkdir -p "$HOME/zig-toolchain"
          tar xJf /tmp/zig.tar.xz --strip-components=1 -C "$HOME/zig-toolchain"
          echo "$HOME/zig-toolchain" >> "$GITHUB_PATH"
          export PATH="$HOME/zig-toolchain:$PATH"
          cargo install cargo-zigbuild --locked
          rustup target add x86_64-unknown-linux-musl aarch64-unknown-linux-musl
          bash rust-core/scripts/build-isekai-pipe-musl.sh

      # cargo-nextestへ移行(process-per-testで実行されるため、1つのlibtestプロセス内で
      # 1000件超のテストが同時実行されていた従来の`cargo test`よりタイムアウト・隔離の
      # 制御がしやすい)。rust-core/.config/nextest.toml の`ci`プロファイルで、既知の
      # CPU競合起因flakyテスト群(faulty_udp_socket::tests::*/multipath_transport::tests::*、
      # rust-quic-test-flakiness-under-loadのメモリ記録参照)にだけper-test retryを
      # 設定している。nextestはdoctestを実行しないため別途`cargo test --doc`で補う。
      # noq-multipath-spikeはworkspace member自体から外してあるため`--exclude`は不要
      # (Codexアーキテクチャレビュー指摘、role-separation-fixesブランチで対応)。
      - name: cargo nextest run --workspace
        working-directory: rust-core
        run: cargo nextest run --profile ci --workspace

      - name: cargo test --doc --workspace
        working-directory: rust-core
        run: cargo test --doc --workspace

  test-macos:
    runs-on: macos-26
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
      RUST_LOG: warn
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain versions
        run: |
          rustc --version
          cargo --version
          ssh -V
          /usr/sbin/sshd -V || true
          ssh-keygen -V || true

      - name: Cache cargo (rust-core)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-core/target
          key: rust-core-test-macos-${{ hashFiles('rust-core/Cargo.lock') }}
          restore-keys: |
            rust-core-test-macos-

      # isekai-transport配下のe2eテスト(multipath_e2e.rs・rebind_e2e.rs、また
      # isekai-terminal-core側のmultipath_transport.rsも同じ手法だが、そちらは
      # このジョブの対象外)が複数の疑似ループバックアドレス(127.0.0.2〜.6)を
      # 「別の物理パス/インターフェース」に見立てて使う——Linuxは127.0.0.0/8
      # 全体をloへ無条件にルーティングするが、macOSは127.0.0.1しかlo0に既定で
      # 割り当てないため、明示的にaliasしないとこれらのアドレス宛のパケットが
      # 疎通せずテストが失敗・タイムアウトする(実test-macos CI失敗で確認済み、
      # 127.0.0.2はsecondary pathが永久にvalidateされずタイムアウト、127.0.0.4は
      # "Can't assign requested address"で発覚)。現在使われている.2/.4(および
      # isekai-terminal-core側の.3/.6)に加え、将来同種のテストが増えても踏み台に
      # ならないよう.2〜.6の範囲をまとめてaliasしておく。
      - name: Alias 127.0.0.2-6 onto lo0 (isekai-transport e2e tests use them as pseudo physical paths; macOS doesn't route 127.0.0.0/8 to lo automatically)
        run: |
          for i in 2 3 4 5 6; do
            sudo ifconfig lo0 alias 127.0.0.$i 255.255.255.255 up
          done

      # isekai-terminal-core(uniffi-bindgen生成物向けのUniFFI cdylib)は除外する:
      # isekai_pipe_quic_transport.rsがLinux musl静的バイナリをinclude_bytes!で
      # 無条件に埋め込むため、`test`ジョブと同じzig/cargo-zigbuildの前提ビルドが
      # 必要になってしまい、このジョブが検証したいCLI/shared crateの話と関係ない。
      # iOS向けクロスビルドの検証はios-rust-core-check.ymlが別途カバー済み。
      # uniffi-bindgenはAndroid/iOS binding生成専用のCLIツールで同様に対象外。
      - name: cargo test --workspace (macOS, excluding Android/iOS-only crates)
        working-directory: rust-core
        run: cargo test --workspace --exclude isekai-terminal-core --exclude uniffi-bindgen

  test-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
      RUST_LOG: warn
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain versions
        shell: bash
        run: |
          rustc --version
          cargo --version

      - name: Cache cargo (rust-core)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-core/target
          key: rust-core-test-windows-${{ hashFiles('rust-core/Cargo.lock') }}
          restore-keys: |
            rust-core-test-windows-

      # isekai-ssh/isekai-pipeはWindowsをクライアントプラットフォームとして
      # 公式サポートする(rust-core/isekai-ssh/README.md参照。接続先ホストは
      # 引き続きLinux固定 — PLAN.md 602行目の「Windows/macOSサーバー対応は
      # 対象外」はリモートホスト側の話であり、クライアントとしてのWindows
      # 対応とは別軸)。以下、`cargo build`(ビルド回帰検出)・
      # `cargo test --lib --bins`(unit test)・下のisekai-ssh e2eテスト5本
      # (実機で動作検証済み)の3段階で検証する。
      #
      # 対象外のまま残すもの:
      # - real_sshd_bootstrap_e2e.rs/real_sshd_multihop_bootstrap_e2e.rs/
      #   ctl_socket_forward_e2e.rs: 実`/usr/sbin/sshd`+`setsid`によるリモート
      #   Linuxホストのデタッチ起動という、接続先が常にLinuxである前提
      #   そのものを検証するテスト。isekai-sshクライアントがWindows上で動く
      #   かどうかとは無関係なので、Windowsで動かそうとしない(Linux専用の
      #   `setsid`挙動をWindows OpenSSH Serverで再現するのは無意味な労力)。
      # - isekai-bootstrap/tests/openssh_e2e.rs等: `ssh(1)`クライアントの
      #   有無だけで判定しており、windows-latestにプリインストール済みの
      #   OpenSSHクライアントのため実際に走ってしまうが、内部で`sh -c`/
      #   `chmod`/`setsid`によるUnix専用のプロセス起動をシェルスクリプト
      #   スタンドイン経由で検証しておりWindows上での動作は未検証・未対応。
      - name: cargo build --workspace (Windows, build-only regression check)
        shell: bash
        working-directory: rust-core
        run: cargo build --workspace --exclude isekai-terminal-core --exclude uniffi-bindgen

      - name: cargo test --lib --bins --workspace (Windows, unit tests only)
        shell: bash
        working-directory: rust-core
        run: cargo test --workspace --exclude isekai-terminal-core --exclude uniffi-bindgen --lib --bins

      # isekai-sshのmock sshdベースe2eテスト(isekai-sshクライアント自身の
      # Windows上での挙動を検証する5ファイル)。実ssh(1)をssh_test_shim
      # (コンパイル済み.exeパススルー、`wrapper_auto_bootstrap_e2e.rs::
      # write_ssh_shim`/`src/bin/ssh_test_shim.rs`参照)経由で差し替え、
      # `--isekai-ssh-path`で明示指定する(裸の`ssh`からは`.cmd`/シェバン
      # スクリプトが見つからない・実行できないため)。ワークスペース全体への
      # `--tests`一括拡張ではなくファイル単位で明示実行しているのは、上の
      # 「対象外のまま残すもの」に挙げたUnix専用の統合テストを誤って
      # 巻き込まないため。
      # `set +e` + 個別exit code集計: bash -e(GitHub Actionsのデフォルト)だと
      # 最初の`cargo test`が失敗した時点でステップ全体が打ち切られ、残り4ファイルが
      # 一度も実行されないまま「1本失敗」としか報告されない(実際に発生した見落とし
      # ——native経路の未登録ホスト自動bootstrap不具合を1本のFAILEDでしか検出できず、
      # 残り4ファイルが同じ原因で落ちるかどうか一度のCI実行で分からなかった)。
      # 5本全部を必ず実行し、失敗があれば最後にまとめて報告する。
      - name: cargo test -p isekai-ssh (Windows, ssh_test_shim対応e2eファイル5本)
        shell: bash
        working-directory: rust-core
        run: |
          set +e
          failed=0
          for t in wrapper_auto_bootstrap_e2e doctor_e2e init_e2e wrapper_auto_download_relay_bootstrap_e2e wrapper_stale_trust_auto_recovery_e2e; do
            echo "::group::cargo test -p isekai-ssh --test $t"
            cargo test -p isekai-ssh --test "$t"
            if [ $? -ne 0 ]; then
              echo "FAILED: $t"
              failed=1
            fi
            echo "::endgroup::"
          done
          exit $failed
