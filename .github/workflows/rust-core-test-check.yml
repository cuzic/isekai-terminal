name: rust-core test check

# rust-core全体のcargo testをCIで実行する(ISEKAI_PIPE_DESIGN.md §8 Epic Cで
# 指摘されていたギャップ: 「rust-core全体のcargo testを実行するCIワークフローが
# 一つも存在しない」への対応)。noq-multipath-spike(実機検証用の使い捨てコード、
# CLAUDE.md参照)のみ除外する——それ以外は`real_sshd_bootstrap_e2e.rs`のような
# opt-in E2Eテスト(実/usr/sbin/sshdを非特権ユーザーとして起動)を含め、
# GitHub-hosted ubuntu runnerだけで完結する。
#
# ネットワークnamespace/tc netemを使うnetlabシナリオ(root権限が必要)は対象外
# (rust-core-netlab-check.ymlが別途カバーする)。

on:
  push:
    branches: [main]
    paths:
      - "rust-core/**"
      - "!rust-core/noq-multipath-spike/**"
      - ".github/workflows/rust-core-test-check.yml"
  pull_request:
    paths:
      - "rust-core/**"
      - "!rust-core/noq-multipath-spike/**"
      - ".github/workflows/rust-core-test-check.yml"
  workflow_dispatch:

concurrency:
  group: rust-core-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # DEBUG(一時的): tmate接続文字列をPRコメントとして中継するために必要
  # (GitHub Actionsは実行中ジョブの生ログをAPI経由で取得できないため)。
  # 原因特定後にpermissionsごと元に戻すこと。
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
      # `real_sshd_bootstrap_e2e.rs`等がstderrに出すisekai-transport/isekai-bootstrapの
      # debug/infoログでCI出力が読みにくくなるのを避ける(ローカル開発時のデフォルトは
      # env_logger未設定=warn相当のまま)。
      RUST_LOG: warn
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain versions
        run: |
          rustc --version
          cargo --version
          ssh -V
          /usr/sbin/sshd -V || true
          ssh-keygen -V || true

      - name: Install openssh-server (opt-in real-sshd E2E tests need /usr/sbin/sshd)
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server

      - name: Cache cargo (rust-core)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-core/target
          key: rust-core-test-${{ runner.os }}-${{ hashFiles('rust-core/Cargo.lock') }}
          restore-keys: |
            rust-core-test-${{ runner.os }}-

      - name: Build isekai-pipe musl binaries (build prerequisite for isekai-terminal-core)
        # rust-core/src/helper_quic_transport.rs が include_bytes! で埋め込む
        # isekai-pipe の x86_64/aarch64 musl静的バイナリ。isekai-terminal-core を
        # workspaceの一部としてビルドする以上、target(iOS/Android/CI)によらず常に必要な
        # 前提(ios-logic-linux-check.yml/ios-rust-core-check.yml/ios-app-build-check.yml/
        # ios-ssh-vertical-slice-check.ymlは既に対応済みだったが、このワークフローだけ
        # 追従が漏れていた)。
        run: |
          set -euo pipefail
          curl -fL -o /tmp/zig.tar.xz \
            "https://ziglang.org/download/0.16.0/zig-x86_64-linux-0.16.0.tar.xz"
          mkdir -p "$HOME/zig-toolchain"
          tar xJf /tmp/zig.tar.xz --strip-components=1 -C "$HOME/zig-toolchain"
          echo "$HOME/zig-toolchain" >> "$GITHUB_PATH"
          export PATH="$HOME/zig-toolchain:$PATH"
          cargo install cargo-zigbuild --locked
          rustup target add x86_64-unknown-linux-musl aarch64-unknown-linux-musl
          bash rust-core/scripts/build-isekai-pipe-musl.sh

      # DEBUG(一時的): real_sshd_multihop_bootstrap_e2e.rsの原因究明のため、
      # 実行環境へ対話的にSSH接続できるようにする。GitHub Actionsは実行中ジョブの
      # 生ログをAPI経由で読めない(`gh run view --log`は完了後のみ)ため、
      # detachedモードにして接続文字列を後続ステップでPRコメントとして中継する。
      # 原因特定後にこれらのステップは削除すること。
      - name: DEBUG tmate session (detached)
        uses: mxschmitt/action-tmate@v3
        with:
          detached: true

      - name: DEBUG relay tmate connection string via PR comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -x
          SOCK=""
          for i in $(seq 1 15); do
            SOCK=$(find /tmp /home/runner -iname "*tmate*.sock" -o -iname "*tmate*" -type s 2>/dev/null | head -1)
            [ -n "$SOCK" ] && break
            sleep 2
          done
          CONN_DEFAULT=$(tmate display -p '#{tmate_ssh}' 2>&1 || true)
          CONN_SOCK=""
          if [ -n "$SOCK" ]; then
            CONN_SOCK=$(tmate -S "$SOCK" display -p '#{tmate_ssh}' 2>&1 || true)
          fi
          {
            echo "DEBUG tmate socket=\`$SOCK\`"
            echo "default-display: \`$CONN_DEFAULT\`"
            echo "socket-display: \`$CONN_SOCK\`"
            echo 'ps:'
            echo '```'
            ps aux | grep -i tmate | grep -v grep
            echo '```'
          } > /tmp/debug-tmate-body.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/debug-tmate-body.md

      - name: DEBUG keep runner alive for interactive session
        run: sleep 1200
