name: rust-core test check

# rust-core全体のcargo testをCIで実行する(ISEKAI_PIPE_DESIGN.md §8 Epic Cで
# 指摘されていたギャップ: 「rust-core全体のcargo testを実行するCIワークフローが
# 一つも存在しない」への対応)。noq-multipath-spike(実機検証用の使い捨てコード、
# CLAUDE.md参照)のみ除外する——それ以外は`real_sshd_bootstrap_e2e.rs`のような
# opt-in E2Eテスト(実/usr/sbin/sshdを非特権ユーザーとして起動)を含め、
# GitHub-hosted ubuntu runnerだけで完結する。
#
# ネットワークnamespace/tc netemを使うnetlabシナリオ(root権限が必要)は対象外
# (rust-core-netlab-check.ymlが別途カバーする)。
#
# test-macos: isekai-ssh/isekai-pipeおよびそれが依存するプラットフォーム横断crate
# (isekai-netmon等)は公式にmacOS対応(release-build.ymlがx86_64/aarch64-apple-darwin
# 向けにビルドしている)だが、実際のtest suiteをmacOSランナー上で実行するCIが
# これまで一つも無く、macOS固有のバグはリリースタグを打つ時(--versionスモーク
# テストのみ)まで発見されなかった。isekai-terminal-core(Android/iOS向けUniFFI
# crate。isekai_pipe_quic_transport.rsがLinux musl静的バイナリをinclude_bytes!で
# 無条件に埋め込むため、別途zig/cargo-zigbuildの前提ビルドが要る)とuniffi-bindgen
# (Android/iOS binding生成ツール、CLI/shared crateのテスト対象外)は除外し、
# それ以外のCLI/shared crateのみをmacOSでも検証する。iOS側の別ビルド確認は
# ios-rust-core-check.yml等が既にカバーしている。
#
# test-windows: 詳細は各ジョブのコメント参照。

on:
  push:
    branches: [main]
    paths:
      - "rust-core/**"
      - "!rust-core/noq-multipath-spike/**"
      - ".github/workflows/rust-core-test-check.yml"
  pull_request:
    paths:
      - "rust-core/**"
      - "!rust-core/noq-multipath-spike/**"
      - ".github/workflows/rust-core-test-check.yml"
  workflow_dispatch:

concurrency:
  group: rust-core-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
      # `real_sshd_bootstrap_e2e.rs`等がstderrに出すisekai-transport/isekai-bootstrapの
      # debug/infoログでCI出力が読みにくくなるのを避ける(ローカル開発時のデフォルトは
      # env_logger未設定=warn相当のまま)。
      RUST_LOG: warn
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain versions
        run: |
          rustc --version
          cargo --version
          ssh -V
          /usr/sbin/sshd -V || true
          ssh-keygen -V || true

      - name: Install openssh-server (opt-in real-sshd E2E tests need /usr/sbin/sshd)
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server

      - name: Build isekai-pipe musl binaries (build prerequisite for isekai-terminal-core)
        # rust-core/src/isekai_pipe_quic_transport.rs が include_bytes! で埋め込む
        # isekai-pipe の x86_64/aarch64 musl静的バイナリ。iOS/Androidどちらのビルドにも
        # 依らずisekai-terminal-coreを cargo test するだけでも常に必要な前提
        # (ios-rust-core-check.yml/ios-app-build-check.yml/ios-ssh-vertical-slice-check.yml/
        # ios-logic-linux-check.ymlは既に対応済みだったが、このワークフローだけ追従が漏れていた)。
        run: |
          set -euo pipefail
          curl -fL -o /tmp/zig.tar.xz \
            "https://ziglang.org/download/0.16.0/zig-x86_64-linux-0.16.0.tar.xz"
          mkdir -p "$HOME/zig-toolchain"
          tar xJf /tmp/zig.tar.xz --strip-components=1 -C "$HOME/zig-toolchain"
          echo "$HOME/zig-toolchain" >> "$GITHUB_PATH"
          export PATH="$HOME/zig-toolchain:$PATH"
          cargo install cargo-zigbuild --locked
          rustup target add x86_64-unknown-linux-musl aarch64-unknown-linux-musl
          bash rust-core/scripts/build-isekai-pipe-musl.sh

      - name: Cache cargo (rust-core)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-core/target
          key: rust-core-test-${{ runner.os }}-${{ hashFiles('rust-core/Cargo.lock') }}
          restore-keys: |
            rust-core-test-${{ runner.os }}-

      - name: cargo test --workspace (excluding noq-multipath-spike)
        working-directory: rust-core
        run: cargo test --workspace --exclude noq-multipath-spike

  test-macos:
    runs-on: macos-26
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
      RUST_LOG: warn
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain versions
        run: |
          rustc --version
          cargo --version
          ssh -V
          /usr/sbin/sshd -V || true
          ssh-keygen -V || true

      - name: Cache cargo (rust-core)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-core/target
          key: rust-core-test-macos-${{ hashFiles('rust-core/Cargo.lock') }}
          restore-keys: |
            rust-core-test-macos-

      # isekai-transport配下のe2eテスト(multipath_e2e.rs・rebind_e2e.rs、また
      # isekai-terminal-core側のmultipath_transport.rsも同じ手法だが、そちらは
      # このジョブの対象外)が複数の疑似ループバックアドレス(127.0.0.2〜.6)を
      # 「別の物理パス/インターフェース」に見立てて使う——Linuxは127.0.0.0/8
      # 全体をloへ無条件にルーティングするが、macOSは127.0.0.1しかlo0に既定で
      # 割り当てないため、明示的にaliasしないとこれらのアドレス宛のパケットが
      # 疎通せずテストが失敗・タイムアウトする(実test-macos CI失敗で確認済み、
      # 127.0.0.2はsecondary pathが永久にvalidateされずタイムアウト、127.0.0.4は
      # "Can't assign requested address"で発覚)。現在使われている.2/.4(および
      # isekai-terminal-core側の.3/.6)に加え、将来同種のテストが増えても踏み台に
      # ならないよう.2〜.6の範囲をまとめてaliasしておく。
      - name: Alias 127.0.0.2-6 onto lo0 (isekai-transport e2e tests use them as pseudo physical paths; macOS doesn't route 127.0.0.0/8 to lo automatically)
        run: |
          for i in 2 3 4 5 6; do
            sudo ifconfig lo0 alias 127.0.0.$i 255.255.255.255 up
          done

      # isekai-terminal-core(uniffi-bindgen生成物向けのUniFFI cdylib)は除外する:
      # isekai_pipe_quic_transport.rsがLinux musl静的バイナリをinclude_bytes!で
      # 無条件に埋め込むため、`test`ジョブと同じzig/cargo-zigbuildの前提ビルドが
      # 必要になってしまい、このジョブが検証したいCLI/shared crateの話と関係ない。
      # iOS向けクロスビルドの検証はios-rust-core-check.ymlが別途カバー済み。
      # uniffi-bindgenはAndroid/iOS binding生成専用のCLIツールで同様に対象外。
      - name: cargo test --workspace (macOS, excluding Android/iOS-only crates)
        working-directory: rust-core
        run: cargo test --workspace --exclude noq-multipath-spike --exclude isekai-terminal-core --exclude uniffi-bindgen

  test-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
      RUST_LOG: warn
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain versions
        shell: bash
        run: |
          rustc --version
          cargo --version

      - name: Cache cargo (rust-core)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-core/target
          key: rust-core-test-windows-${{ hashFiles('rust-core/Cargo.lock') }}
          restore-keys: |
            rust-core-test-windows-

      # Windows(windows-msvc)はisekai-ssh/README.mdで明記の通り「公式サポート
      # 対象外」——このジョブの目的はそれを覆すことではなく、release-build.yml
      # (タグ/workflow_dispatch時のみ`--version`スモークテスト)がビルド確認する
      # 前にpush/PRの時点でWindowsビルド自体の回帰を検出することだけ。
      #
      # `cargo test`ではなく`cargo build`のみに留める: real_sshd系のe2eテストは
      # `/usr/sbin/sshd`の有無で自動skipするが(real_sshd_bootstrap_e2e.rs等)、
      # isekai-bootstrap/tests/openssh_e2e.rs等は`ssh(1)`クライアントの有無だけで
      # 判定しており、windows-latestランナーにはOpenSSHクライアント(ssh.exe)が
      # プリインストールされているため実際に走ってしまう。これらは内部で
      # `sh -c`/`chmod`/`setsid`によるUnix専用のプロセス起動を実際のヘルパー
      # スタンドイン(shell script)経由で検証しており、Windows上での動作は
      # 未検証・未サポート。ここでビルド回帰だけを見て、Unix依存のe2e統合
      # テストは意図的に対象外にする(黙って壊れているのではなく、方針)。
      - name: cargo build --workspace (Windows, build-only regression check)
        shell: bash
        working-directory: rust-core
        run: cargo build --workspace --exclude noq-multipath-spike --exclude isekai-terminal-core --exclude uniffi-bindgen

      - name: cargo test --lib --bins --workspace (Windows, unit tests only)
        shell: bash
        working-directory: rust-core
        run: cargo test --workspace --exclude noq-multipath-spike --exclude isekai-terminal-core --exclude uniffi-bindgen --lib --bins

      # Windows公式サポート化(進行中): isekai-sshのmock sshdベースe2eテストの
      # うち、ssh_test_shim(コンパイル済み.exeパススルー、
      # `wrapper_auto_bootstrap_e2e.rs::write_ssh_shim`/`src/bin/ssh_test_shim.rs`
      # 参照)経由でWindows対応した5ファイルをここで個別に明示実行する。
      # 上のjobコメント(187-200行目)の「Unix依存のe2e統合テストは対象外」は
      # real_sshd_*系(接続先が常にLinuxである前提を検証するテスト、
      # `setsid`等Unix専用のリモート挙動)や`isekai-bootstrap/tests/openssh_e2e.rs`
      # には引き続き当てはまるが、この5本(isekai-sshクライアント自身の
      # Windows上での挙動を検証するテスト)は実機で検証済み。green確認でき
      # 次第、`--tests`ベースの段階的な拡張(残りのcrateへの展開)へ統合して
      # いく(isekai-ssh-windows-support一連の変更、進行中)。
      - name: cargo test -p isekai-ssh (Windows, ssh_test_shim対応e2eファイルのみ明示実行)
        shell: bash
        working-directory: rust-core
        run: |
          cargo test -p isekai-ssh --test wrapper_auto_bootstrap_e2e
          cargo test -p isekai-ssh --test doctor_e2e
          cargo test -p isekai-ssh --test init_e2e
          cargo test -p isekai-ssh --test wrapper_auto_download_relay_bootstrap_e2e
          cargo test -p isekai-ssh --test wrapper_stale_trust_auto_recovery_e2e
