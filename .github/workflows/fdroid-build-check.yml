name: F-Droid build check

# Simulates what an F-Droid buildserver would do when it processes
# fdroid/tools.isekai.terminal.yml: install the pinned NDK, run the recipe's
# `sudo:` setup commands (as root, like F-Droid does), then build with a
# plain non-root `gradle:` step. This exists to catch drift between the
# recipe and the actual build *before* submitting to fdroiddata, since none
# of this has been verified against a real F-Droid buildserver yet.

on:
  # このジョブは現状 isekai-helper の musl バイナリを未ビルドのまま
  # `cargo build` を叩くため、常に失敗する(#67参照)。musl バイナリの
  # ビルド手順を組み込むまでの間、push/PR 毎の必須チェックからは外し、
  # リリースタグ(`v*`)を打った時とworkflow_dispatchでの手動実行のみにする。
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  simulate-fdroid-build:
    runs-on: ubuntu-latest
    env:
      RECIPE: fdroid/tools.isekai.terminal.yml
    steps:
      - uses: actions/checkout@v4

      - name: Read recipe fields (ndk / sudo / gradle) with PyYAML
        id: recipe
        run: |
          pip install --quiet --user pyyaml
          python3 - "$RECIPE" <<'PY'
          import sys, yaml, json, os
          d = yaml.safe_load(open(sys.argv[1]))
          build = d["Builds"][0]
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"ndk={build['ndk']}\n")
              out.write(f"commit={build['commit']}\n")
          with open("/tmp/fdroid-sudo-setup.sh", "w") as f:
              f.write("#!/usr/bin/env bash\nset -euo pipefail\n")
              for line in build.get("sudo", []):
                  f.write(line + "\n")
          print("--- recipe Builds[0] ---")
          print(json.dumps(build, indent=2))
          PY
          chmod +x /tmp/fdroid-sudo-setup.sh
          echo "--- extracted sudo: setup script ---"
          cat /tmp/fdroid-sudo-setup.sh

      - name: Remove the runner's preinstalled Rust toolchain
        # GitHub's hosted runner image ships rustup at ~/.cargo for CI
        # convenience, ahead of /usr/local/bin on PATH. F-Droid's actual
        # buildserver has no Rust preinstalled, so leaving this in place would
        # let the recipe's sudo: install (which lands in /usr/local/bin) get
        # silently shadowed, masking whether the recipe's own install even
        # works — see the run this fixed for exactly that failure.
        run: |
          rm -rf "$HOME/.cargo" "$HOME/.rustup"
          sudo rm -rf /usr/local/cargo /usr/local/rustup
          hash -r

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install the NDK version pinned by the recipe
        run: |
          NDK_VERSION="${{ steps.recipe.outputs.ndk }}"
          echo "Installing NDK $NDK_VERSION (as declared in $RECIPE)"
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install "ndk;$NDK_VERSION"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/$NDK_VERSION" >> "$GITHUB_ENV"

      - name: "Run the recipe's sudo: block (root, like F-Droid's buildserver)"
        run: sudo bash -x /tmp/fdroid-sudo-setup.sh

      - name: Confirm cargo/rustc are reachable without sudo
        run: |
          # This step exists because the recipe's symlinks bypass rustup's
          # proxy shim entirely (see the comment in the recipe for why) - so
          # cargo/rustc must work here with zero rustup-specific env vars set.
          # Whether the aarch64-linux-android target is actually installed is
          # left to the real `cargo build --target aarch64-linux-android`
          # step below to prove; a wrong/missing target fails loudly there.
          which cargo
          which rustc
          cargo --version
          rustc --version

      - name: Cache Gradle and Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.cargo/registry
            rust-core/target
          key: fdroid-build-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml', 'rust-core/Cargo.lock') }}

      - name: "Build (matches the recipe's gradle: yes)"
        run: ./gradlew assembleRelease --stacktrace

      - name: Verify an APK was produced
        run: |
          find android/build/outputs/apk -name "*.apk" -print -exec ls -la {} \;
          test -n "$(find android/build/outputs/apk -name '*.apk')"
