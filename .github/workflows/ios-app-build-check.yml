name: iOS app build check

# IsekaiTerminalApp(ios/App/IsekaiTerminalApp.xcodeproj、Phase 1A-1のXcodeアプリ雛形)が
# IsekaiTerminalCore SwiftPMパッケージ(rust-core経由でビルドしたXCFrameworkを含む)をリンクして
# iOS Simulator向けにビルドできることを検証する(PLAN.md「Phase Y」節 Phase 1A参照)。
# コード署名は行わない(シミュレータ向けビルドのみのため不要)。
#
# rust-core/isekai-pipe側のビルド前提・XCFramework生成手順は
# ios-rust-core-check.ymlと同じ(公開リポジトリなのでmacOSランナーは無課金)。
#
# Phase 1D: TerminalSessionControllerE2ETests(実sshdへの接続+CredentialVault
# 経由の鍵解決を検証する)がCI fixtureを必要とするため、ここでも起動する
# (ios-ssh-vertical-slice-check.ymlとはポートを分けて2298を使う)。

on:
  push:
    branches: [main]
    paths:
      - "rust-core/**"
      - "ios/**"
      - ".github/workflows/ios-app-build-check.yml"
  pull_request:
    paths:
      - "rust-core/**"
      - "ios/**"
      - ".github/workflows/ios-app-build-check.yml"
  workflow_dispatch:

concurrency:
  group: ios-app-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 45
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain versions
        run: |
          sw_vers
          uname -m
          xcodebuild -version
          rustc --version
          cargo --version

      - name: Install Rust iOS targets
        run: |
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

      # release-build.ymlのLinuxクロスビルドと同じmlugg/setup-zigを使う
      # (以前はbrew install zigだったが、Homebrewのtap trust必須化で無関係な
      # brew installまで失敗しうる問題があった。setup-zigはHomebrewを経由
      # しないためこの問題自体が起きない。2026-07-14に統一)。
      - name: Install zig (mlugg/setup-zig)
        uses: mlugg/setup-zig@v2
        with:
          version: latest

      # muslバイナリビルド(cargo-zigbuildのインストールも含む)より前に置く。
      # 以前はキャッシュ復元がmuslビルドの後にあったため、cargoレジストリ/ビルド
      # 成果物のキャッシュがこのステップに一切効かず、毎回コールドビルドで
      # 10分以上かかっていた(2026-07-14に発覚・修正)。
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            rust-core/target
          key: ios-app-build-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-core/Cargo.lock') }}
          restore-keys: |
            ios-app-build-${{ runner.os }}-${{ runner.arch }}-

      - name: Build isekai-pipe musl binaries (build prerequisite for isekai-terminal-core)
        run: |
          if ! command -v cargo-zigbuild >/dev/null; then
            cargo install cargo-zigbuild --locked
          fi
          rustup target add x86_64-unknown-linux-musl aarch64-unknown-linux-musl
          bash rust-core/scripts/build-isekai-pipe-musl.sh

      - name: Build XCFramework
        run: bash rust-core/scripts/build-ios-xcframework.sh

      - name: Resolve Swift package dependencies
        working-directory: ios/App
        run: xcodebuild -resolvePackageDependencies -project IsekaiTerminalApp.xcodeproj -scheme IsekaiTerminalApp

      - name: Start sshd fixture
        run: bash rust-core/scripts/ios-fixture/start-sshd-fixture.sh /tmp/ios-fixture 2298

      - name: Pick an available iOS Simulator device
        id: sim
        run: |
          set -euo pipefail
          DEVICE_NAME=$(xcrun simctl list devices available -j | python3 -c '
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data["devices"].items():
              if "iOS" not in runtime:
                  continue
              for d in devices:
                  if d.get("isAvailable") and d.get("name", "").startswith("iPhone"):
                      print(d["name"])
                      sys.exit(0)
          sys.exit(1)
          ')
          echo "device_name=$DEVICE_NAME" >> "$GITHUB_OUTPUT"
          echo "picked simulator: $DEVICE_NAME"

      - name: Build and test IsekaiTerminalApp on iOS Simulator
        # CODE_SIGNING_ALLOWED=NOで署名を無効化すると、IsekaiTerminalAppTests
        # (CredentialVaultのKeychainテストをホストする)がerrSecMissingEntitlement
        # (-34018)で失敗する。署名はXcodeの自動ローカル署名に任せる。
        working-directory: ios/App
        run: |
          xcodebuild -list -project IsekaiTerminalApp.xcodeproj
          xcodebuild test \
            -project IsekaiTerminalApp.xcodeproj \
            -scheme IsekaiTerminalApp \
            -destination 'platform=iOS Simulator,name=${{ steps.sim.outputs.device_name }}'

      - name: Stop sshd fixture
        if: always()
        run: bash rust-core/scripts/ios-fixture/stop-sshd-fixture.sh /tmp/ios-fixture
