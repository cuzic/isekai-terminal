name: iOS app build check

# TsshTerminalApp(ios/App/TsshTerminalApp.xcodeproj、Phase 1A-1のXcodeアプリ雛形)が
# TsshCore SwiftPMパッケージ(rust-core経由でビルドしたXCFrameworkを含む)をリンクして
# iOS Simulator向けにビルドできることを検証する(PLAN.md「Phase Y」節 Phase 1A参照)。
# コード署名は行わない(シミュレータ向けビルドのみのため不要)。
#
# rust-core/isekai-helper側のビルド前提・XCFramework生成手順は
# ios-rust-core-check.ymlと同じ(公開リポジトリなのでmacOSランナーは無課金)。

on:
  push:
    branches: [main]
    paths:
      - "rust-core/**"
      - "ios/**"
      - ".github/workflows/ios-app-build-check.yml"
  pull_request:
    paths:
      - "rust-core/**"
      - "ios/**"
      - ".github/workflows/ios-app-build-check.yml"
  workflow_dispatch:

concurrency:
  group: ios-app-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain versions
        run: |
          sw_vers
          uname -m
          xcodebuild -version
          rustc --version
          cargo --version

      - name: Install Rust iOS targets
        run: |
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

      - name: Build isekai-helper musl binaries (build prerequisite for tssh-core)
        run: |
          brew install zig
          cargo install cargo-zigbuild --locked
          rustup target add x86_64-unknown-linux-musl aarch64-unknown-linux-musl
          bash rust-core/scripts/build-isekai-helper-musl.sh

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-core/target
          key: ios-app-build-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-core/Cargo.lock') }}
          restore-keys: |
            ios-app-build-${{ runner.os }}-${{ runner.arch }}-

      - name: Build XCFramework
        run: bash rust-core/scripts/build-ios-xcframework.sh

      - name: Resolve Swift package dependencies
        working-directory: ios/App
        run: xcodebuild -resolvePackageDependencies -project TsshTerminalApp.xcodeproj -scheme TsshTerminalApp

      - name: Pick an available iOS Simulator device
        id: sim
        run: |
          set -euo pipefail
          DEVICE_NAME=$(xcrun simctl list devices available -j | python3 -c '
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data["devices"].items():
              if "iOS" not in runtime:
                  continue
              for d in devices:
                  if d.get("isAvailable") and d.get("name", "").startswith("iPhone"):
                      print(d["name"])
                      sys.exit(0)
          sys.exit(1)
          ')
          echo "device_name=$DEVICE_NAME" >> "$GITHUB_OUTPUT"
          echo "picked simulator: $DEVICE_NAME"

      - name: Build TsshTerminalApp for iOS Simulator
        working-directory: ios/App
        run: |
          xcodebuild -list -project TsshTerminalApp.xcodeproj
          xcodebuild build-for-testing \
            -project TsshTerminalApp.xcodeproj \
            -scheme TsshTerminalApp \
            -destination 'platform=iOS Simulator,name=${{ steps.sim.outputs.device_name }}' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""
