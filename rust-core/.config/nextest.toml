[profile.ci]
fail-fast = false
retries = 0

# CIランナー(GitHub-hosted ubuntu-24.04)上のCPU競合で、実際のロジックとは無関係に
# QUIC接続がidle timeout/操作タイムアウトへ到達して稀に失敗するfault-injection
# テスト群。`faulty_udp_socket.rs`/`multipath_transport.rs`のdocコメント、
# メモリ記録`rust-quic-test-flakiness-under-load`参照。本当に壊れていれば
# (新規server/client/connectionを都度作り直しても)毎回同じく失敗するため、
# リトライで実バグを見逃すリスクは低い。
[[profile.ci.overrides]]
filter = 'package(isekai-terminal-core) and (test(/^faulty_udp_socket::tests::/) or test(/^multipath_transport::tests::/))'
retries = 2
